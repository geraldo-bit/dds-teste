<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Digital - SENAI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="tela-login" class="container-login">
        <div class="login-box">
            <img src="https://logospng.org/download/senai/logo-senai-256.png" alt="Logo SENAI" class="logo-senai">
            <h2>Portal DSS Digital</h2>
            
            <form id="form-login">
                <p class="titulo-sessao">Acesso do Professor:</p>
                <div class="input-group">
                    <input type="email" id="email-login" placeholder="E-mail Institucional" required>
                </div>
                <div class="input-group">
                    <input type="password" id="senha-login" placeholder="Senha" required>
                </div>
                <button type="submit" id="btn-entrar">Entrar como Professor</button>
            </form>
            <p id="msg-erro" class="erro-escondido">E-mail ou senha inválidos.</p>

            <hr class="divisor">
            
            <p class="titulo-sessao">É colaborador/aluno?</p>
            <button id="btn-entrar-aluno" class="btn-aluno">Acessar Lista de Presença</button>
        </div>
    </div>

    <div id="tela-dss" class="container" style="display: none;">
        <header>
            <h2> Lista de Presença - DSS</h2>
            <p>Operador: <strong id="usuario-logado"></strong></p>
            <div class="status-global">Status da Lista: <span id="badge-status"> Carregando...</span></div>
            
            <div class="responsavel-box">
                ️ Apresentador do DSS de Hoje: <strong id="nome-responsavel"> Carregando...</strong>
            </div>

            <button id="btn-sair" class="btn-deslogar">Voltar ao Início</button>
        </header>

        <main>
            <div id="painel-professor" class="controle-professor" style="display: none;">
                <h3>Controle do Professor</h3>
                <div class="controle-acoes">
                    <button id="btn-trava"> Liberar Lista</button>
                    <button id="btn-pular"> Pular (Faltou)</button>
                </div>
            </div>

            <div class="registro-box">
                <div class="input-group">
                    <label for="matricula">Matrícula do Colaborador</label>
                    <input type="number" id="matricula" placeholder="Aguardando liberação..." autocomplete="off" disabled>
                </div>
                
                <div class="input-group">
                    <label for="nome">Nome Automático</label>
                    <input type="text" id="nome" placeholder="Aguardando matrícula..." readonly>
                </div>
                
                <button id="btn-assinar" disabled>Assinar</button>
            </div>

            <div class="tabela-container">
                <table id="tabela-presenca">
                    <thead>
                        <tr>
                            <th>Matrícula</th>
                            <th>Nome</th>
                            <th>Assinatura</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

            <div class="acoes-finais">
                <button id="btn-finalizar" style="display: none;"> Finalizar DSS do Dia</button>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
