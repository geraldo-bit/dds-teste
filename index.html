<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSS Digital - SENAI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="tela-login" class="container-login">
        <div class="login-box">
            <img src="https://logospng.org/download/senai/logo-senai-256.png" alt="Logo SENAI" class="logo-senai">
            <h2>Portal DSS Digital</h2>
            <p>Faça login com sua conta institucional</p>
            
            <form id="form-login">
                <div class="input-group">
                    <label for="email-login">E-mail Institucional</label>
                    <input type="email" id="email-login" placeholder="exemplo@aluno.senai.br" required>
                </div>
                
                <div class="input-group">
                    <label for="senha-login">Senha</label>
                    <input type="password" id="senha-login" placeholder="Sua senha" required>
                </div>
                
                <button type="submit" id="btn-entrar">Entrar</button>
            </form>
            <p id="msg-erro" class="erro-escondido">Por favor, utilize um e-mail válido do SENAI.</p>
        </div>
    </div>

    <div id="tela-dss" class="container" style="display: none;">
        <header>
            <h2>📋 Lista de Presença - DSS</h2>
            <p>Operador Logado: <strong id="usuario-logado"></strong></p>
            <button id="btn-sair" class="btn-deslogar">Sair da Conta</button>
        </header>

        <main>
            <div class="registro-box">
                <div class="input-group">
                    <label for="matricula">Matrícula do Colaborador</label>
                    <input type="number" id="matricula" placeholder="Ex: 1001" autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="nome">Nome Automático</label>
                    <input type="text" id="nome" placeholder="Aguardando matrícula..." readonly>
                </div>
                
                <button id="btn-assinar" disabled>Assinar</button>
            </div>

            <div class="tabela-container">
                <table id="tabela-presenca">
                    <thead>
                        <tr>
                            <th>Matrícula</th>
                            <th>Nome</th>
                            <th>Assinatura</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

            <div class="acoes-finais">
                <button id="btn-finalizar">✅ Finalizar DSS</button>
            </div>
        </main>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
